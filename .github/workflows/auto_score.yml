name: Auto Score

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest

    env:
      MUSIC_U: ${{ secrets.MUSIC_U }}
      CSRF: ${{ secrets.CSRF }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
      WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
      FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
      SCORE: ${{ secrets.SCORE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.txt

      - name: Debug before run
        run: |
          set -e
          echo "Current directory:"
          pwd

          echo "Files:"
          ls -la

          echo "Python version:"
          python --version

          echo "Check required secrets:"
          python - <<'PY'
          import os
          import sys

          names = [
              "MUSIC_U",
              "CSRF",
              "SCORE",
              "FULL_EXTRA_TASKS",
              "WAIT_TIME_MIN",
              "WAIT_TIME_MAX",
              "NOTIFY_EMAIL",
              "EMAIL_PASSWORD",
              "SMTP_SERVER",
              "SMTP_PORT",
          ]

          for name in names:
              value = os.getenv(name)
              print(f"{name} exists:", bool(value))

          required = ["MUSIC_U", "CSRF"]
          missing = [name for name in required if not os.getenv(name)]

          if missing:
              print("Missing required secrets:", ", ".join(missing))
              sys.exit(1)
          PY

      - name: Run script
        run: |
          set -e
          echo "Start running main.py"
          python -u main.py
          echo "main.py finished"
