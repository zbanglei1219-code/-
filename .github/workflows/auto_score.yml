name: Auto Score

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --index-url https://pypi.org/simple --no-cache-dir -r requirements.txt

      - name: Run script
        env:
          MUSIC_U: ${{ secrets.MUSIC_U }}
          CSRF: ${{ secrets.CSRF }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
          WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
          FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
          SCORE: ${{ secrets.SCORE }}
        run: python main.py
