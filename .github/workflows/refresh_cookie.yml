name: Check Cookie

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        env:
          MUSIC_U: ${{ secrets.MUSIC_U }}
          CSRF: ${{ secrets.CSRF }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          missing=0

          check_secret() {
            if [ -z "${!1}" ]; then
              echo "::error::$1 is empty or not configured"
              missing=1
            else
              echo "$1 is configured"
            fi
          }

          check_secret MUSIC_U
          check_secret CSRF
          check_secret NOTIFY_EMAIL
          check_secret EMAIL_PASSWORD
          check_secret SMTP_SERVER
          check_secret SMTP_PORT

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check cookie status
        env:
          CHECK_COOKIE_ONLY: "1"
          MUSIC_U: ${{ secrets.MUSIC_U }}
          CSRF: ${{ secrets.CSRF }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python refresh_cookie.py
